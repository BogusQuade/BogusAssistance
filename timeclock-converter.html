<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Sheet Exporter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.16.9/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .icon {
            font-size: 60px;
            margin-bottom: 15px;
        }
        h1 {
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #7f8c8d;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            opacity: 0.9;
        }
        #downloadBtn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            display: none;
        }
        #message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            text-align: center;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">⏰</div>
            <h1>Time Sheet Exporter</h1>
            <p class="subtitle">Convert your timeclock data</p>
        </div>

        <div class="form-group">
            <label>📁 Excel File</label>
            <input type="file" id="fileInput" accept=".xlsx,.xls" />
        </div>

        <div class="form-group">
            <label>📅 Start Date</label>
            <input type="date" id="startDate" />
        </div>

        <div class="form-group">
            <label>📅 End Date</label>
            <input type="date" id="endDate" />
        </div>

        <button onclick="processFile()">⚙️ Process</button>
        <button id="downloadBtn" onclick="downloadFile()">📥 Download</button>

        <div id="message"></div>
    </div>

    <script>
        let resultData = null;

        function processFile() {
            const file = document.getElementById('fileInput').files[0];
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;

            if (!file) return showMsg('Select a file', 'error');
            if (!start || !end) return showMsg('Select dates', 'error');

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const wb = XLSX.read(e.target.result, { type: 'array' });
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const data = XLSX.utils.sheet_to_json(ws);

                    resultData = data.filter(row => row['Name'] && row['Date']);
                    
                    document.getElementById('downloadBtn').style.display = 'block';
                    showMsg('✓ Ready to download!', 'success');
                } catch (err) {
                    showMsg('Error: ' + err.message, 'error');
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function downloadFile() {
            if (!resultData) return;
            const ws = XLSX.utils.json_to_sheet(resultData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Data');
            XLSX.writeFile(wb, 'TimeSheet_' + new Date().toISOString().split('T')[0] + '.xlsx');
        }

        function showMsg(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = type;
            msg.style.display = 'block';
        }
    </script>
</body>
</html>
