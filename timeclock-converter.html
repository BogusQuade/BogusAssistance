<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronos Flow</title>
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .container {
        background: white;
        border-radius: 15px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 600px;
        width: 100%;
        padding: 40px;
        text-align: center;
    }
    .header {
        text-align: center;
        margin-bottom: 30px;
    }
    .icon {
        font-size: 60px;
        margin-bottom: 15px;
    }
    h1 {
        color: #11998e;
        font-size: 28px;
        margin-bottom: 10px;
    }
    .subtitle {
        color: #7f8c8d;
        font-size: 14px;
        margin-bottom: 20px;
    }
    .description {
        color: #555;
        font-size: 16px;
        margin-bottom: 30px;
        line-height: 1.6;
    }
    button {
        width: 100%;
        padding: 14px 20px;
        background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(17, 153, 142, 0.3);
    }
    .footer {
        margin-top: 20px;
        font-size: 12px;
        color: #999;
    }
</style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">⏰</div>
            <h1>Chronos Flow</h1>
            <p class="subtitle">Time Sheet Management Made Easy</p>
        </div>

        <p class="description">
            Convert your timeclock data into perfectly formatted timesheets. 
            Upload your Excel file, select your date range, and get professional 
            results in seconds.
        </p>

        <button onclick="goToChronosFlow()">🚀 Open Chronos Flow</button>

        <div class="footer">
            <p>Powered by Base44 Technology</p>
        </div>
    </div>

    <script>
        function goToChronosFlow() {
            window.location.href = 'https://bogustimesheethelper.base44.app';
        }
    </script>
</body>
</html>
