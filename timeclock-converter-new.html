<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Sheet Exporter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.16.9/xlsx.full.min.js"></script>
    <style>
        body {
            background: linear-gradient(to right, #6a11cb, #2575fc);
            font-family: Arial, sans-serif;
            color: white;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.6);
        }
        h1 {
            text-align: center;
            font-size: 2em;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: none;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 15px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            margin: 10px 0;
        }
        button:hover {
            background-color: #45a049;
        }
        #downloadBtn {
            background-color: #2196F3;
            display: none;
        }
        #downloadBtn:hover {
            background-color: #0b7dda;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🕒 Time Sheet Exporter</h1>
        <div class="card">
            <label for="startDate">Select Date Range:</label>
            <input type="date" id="startDate" />
            <input type="date" id="endDate" />
            <label for="excelUpload">Upload Your Excel File:</label>
            <input type="file" id="excelUpload" accept=".xlsx" />
            <button onclick="processData()">📥 Process Timeclock Data</button>
            <button id="downloadBtn" onclick="downloadProcessedFile()">📥 Download Processed File</button>
        </div>
    </div>
    <script>
        let processedData = null;

        function processData() {
            const fileInput = document.getElementById('excelUpload');
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;

            if (!fileInput.files.length) {
                alert('Please select an Excel file');
                return;
            }

            if (!startDate || !endDate) {
                alert('Please select both start and end dates');
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[sheetName];
                    const jsonData = XLSX.utils.sheet_to_json(worksheet);

                    const startObj = new Date(startDate);
                    const endObj = new Date(endDate);

                    processedData = processAttendance(jsonData, startObj, endObj);
                    document.getElementById('downloadBtn').style.display = 'block';
                    alert('File processed successfully! Click Download to get your file.');
                } catch (error) {
                    alert('Error: ' + error.message);
                }
            };

            reader.readAsArrayBuffer(file);
        }

        function processAttendance(data, startDate, endDate) {
            const attendance = {};

            data.forEach(row => {
                const name = row['Name'];
                const dateStr = row['Date'];
                const status = row['Attendance Status'];

                if (!name || !dateStr || !status) return;

                const dateObj = parseExcelDate(dateStr);
                if (!dateObj || dateObj < startDate || dateObj > endDate) return;

                const dateKey = dateObj.toISOString().split('T')[0];

                if (!attendance[name]) {
                    attendance[name] = {};
                }
                if (!attendance[name][dateKey]) {
                    attendance[name][dateKey] = { checkIn: null, checkOut: null };
                }

                const time = dateObj.toTimeString().split(' ')[0];

                if (status.toLowerCase().includes('check-in')) {
                    if (!attendance[name][dateKey].checkIn || time < attendance[name][dateKey].checkIn) {
                        attendance[name][dateKey].checkIn = time;
                    }
                } else if (status.toLowerCase().includes('check-out')) {
                    if (!attendance[name][dateKey].checkOut || time > attendance[name][dateKey].checkOut) {
                        attendance[name][dateKey].checkOut = time;
                    }
                }
            });

            return attendance;
        }

        function parseExcelDate(dateStr) {
            const match = dateStr.match(/(\d{4})\/(\d{2})\/(\d{2})\s+(\d{2}):(\d{2}):(\d{2})/);
            if (match) {
                return new Date(match[1], match[2] - 1, match[3], match[4], match[5], match[6]);
            }
            return null;
        }

        function downloadProcessedFile() {
            if (!processedData) {
                alert('No data to download');
                return;
            }

            const output = [];
            const names = Object.keys(processedData).sort();

            names.forEach(name => {
                const dates = Object.keys(processedData[name]).sort();
                dates.forEach(date => {
                    const record = processedData[name][date];
                    output.push({
                        Name: name,
                        Date: date,
                        'Check In': record.checkIn || '',
                        'Check Out': record.checkOut || ''
                    });
                });
            });

            const worksheet = XLSX.utils.json_to_sheet(output);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, 'Time Sheet');

            const excelBuffer = XLSX.write(workbook, { bookType: 'xlsx', type: 'array' });
            const blob = new Blob([excelBuffer], { type: 'application/octet-stream' });
            const url = URL.createObjectURL(blob);

            const link = document.createElement('a');
            link.href = url;
            link.download = 'TimeSheet_' + new Date().toISOString().split('T')[0] + '.xlsx';
            link.click();
        }
    </script>
</body>
</html>
